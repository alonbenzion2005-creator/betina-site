<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA GOLD — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root{
      --paper:#fdfcfa;
      --ink:#1b1815;
      --ink-soft:#6b6358;
      --gold-deep:#8f6a3f;
      --serif:"Cormorant Garamond",Georgia,serif;
      --display:"Bodoni Moda","Didot",Georgia,serif;
      --label:"Jost","Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#e9e3da;color:var(--ink);font-family:var(--serif);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;}

    /* Proportional canvas: 1109 x 691 (origin of original was at y=87) */
    .stage{
      position:relative;
      width:100%;
      max-width:1109px;
      aspect-ratio:1109 / 691;
      background:var(--paper);
      container-type:inline-size;
      overflow:hidden;
    }

    /* ---- Header ---- */
    .logo{
      position:absolute; top:1.3%; left:0; width:100%;
      text-align:center;
      font-family:var(--display); font-weight:500;
      font-size:13.65cqw; line-height:1; letter-spacing:0.06em; text-indent:0.06em;
    }
    .nav{
      position:absolute; top:25.4%; left:2.80%;
      display:flex; gap:1.2cqw;
      font-family:var(--serif);
      letter-spacing:0.01em; font-size:1.38cqw; color:var(--ink-soft);
    }
    .nav a{position:relative; color:inherit; text-decoration:none;}
    .nav a:first-child{ text-decoration:underline; text-underline-offset:3px; }
    .booknow{
      position:absolute; left:80.88%; top:24.46%; width:9.02%; height:4.34%;
      display:flex; align-items:center; justify-content:center;
      border:1px solid var(--ink); border-radius:40px;
      font-family:var(--label); text-transform:uppercase; letter-spacing:0.14em;
      font-size:0.92cqw; color:var(--ink);
    }
    .login{
      position:absolute; left:91.88%; top:24.8%;
      display:flex; align-items:center; gap:0.4cqw;
      font-family:var(--label); text-transform:uppercase; letter-spacing:0.05em;
      font-size:1.0cqw; color:var(--ink);
    }
    .login::before{
      content:""; width:1.7cqw; height:1.7cqw; border-radius:50%;
      border:1px solid var(--ink); display:inline-block;
      background:radial-gradient(circle at 50% 38%, var(--ink) 0 26%, transparent 27%),
                 radial-gradient(circle at 50% 95%, var(--ink) 0 42%, transparent 43%);
    }

    /* ---- Heading ---- */
    .heading{
      position:absolute; left:61.32%; top:32.6%; width:34.99%;
    }
    .heading h1{
      font-family:var(--display); font-weight:500;
      font-size:2.12cqw; line-height:1.2; letter-spacing:0.01em;
      white-space:nowrap;
    }
    .heading h1 .pin{ color:var(--ink); white-space:nowrap; }
    .heading p{
      font-family:var(--serif); font-style:italic; color:var(--ink-soft);
      font-size:1.78cqw; margin-top:1.3cqw;
    }

    /* ---- Photo placeholders ---- */
    .ph{
      position:absolute;
      display:flex; align-items:center; justify-content:center;
      background:repeating-linear-gradient(135deg,#ece5da 0 14px,#e6ddcf 14px 28px);
      border:1px dashed #bcae97; color:#9a8c74; overflow:hidden;
    }
    .ph span{
      font-family:var(--label); text-transform:uppercase; letter-spacing:0.2em;
      font-size:0.85cqw; text-align:center; padding:0.6em;
    }
    .ph span::before{ content:"⬡"; display:block; font-size:1.6cqw; margin-bottom:0.4em; color:#c2b49b; }

    .p1{ left:2.71%;  top:30.97%; width:38.05%; height:66.57%; }
    .p2{ left:41.57%; top:31.11%; width:17.76%; height:29.38%; }
    .p3{ left:55.55%; top:60.35%; width:17.31%; height:39.07%; }
    .p4{ left:72.95%; top:60.35%; width:27.14%; height:39.07%; }

    /* underline accent at very bottom (as in the reference) */
    .stage::after{
      content:""; position:absolute; left:0; right:0; bottom:0; height:2px;
      background:linear-gradient(90deg,var(--gold-deep),transparent);
      opacity:.5;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="logo">LA&nbsp;GOLD</div>

    <nav class="nav">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Gallery</a>
      <a href="#">Contact</a>
    </nav>

    <a class="booknow" href="#">Book Now</a>
    <a class="login" href="#">Log In</a>

    <div class="heading">
      <h1>Custom Spray Tan Artist <span class="pin">· Germany</span></h1>
      <p>The perfect golden glow</p>
    </div>

    <div class="ph p1"><span>Portrait</span></div>
    <div class="ph p2"><span>Formula Swatches</span></div>
    <div class="ph p3"><span>Airbrush Detail</span></div>
    <div class="ph p4"><span>Glow Group</span></div>
  </div>
</body>
</html>
