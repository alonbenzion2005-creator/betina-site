<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA GOLD — Words from Our Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root{
      --paper:#fdfcfa;
      --ink:#1b1815;
      --ink-soft:#6b6358;
      --gold-deep:#8f6a3f;
      --quote:#2e3a45;
      --card:#f2efe9;
      --serif:"Cormorant Garamond",Georgia,serif;
      --display:"Bodoni Moda","Didot",Georgia,serif;
      --label:"Jost","Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#e9e3da;color:var(--ink);font-family:var(--serif);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;}

    /* Proportional canvas: 1109 x 691 */
    .stage{
      position:relative;
      width:100%;
      max-width:1109px;
      aspect-ratio:1109 / 691;
      background:var(--paper);
      container-type:inline-size;
      overflow:hidden;
    }

    /* ---- Photo placeholder ---- */
    .ph{
      position:absolute;
      display:flex; align-items:center; justify-content:center;
      background:repeating-linear-gradient(135deg,#ece5da 0 14px,#e6ddcf 14px 28px);
      border:1px dashed #bcae97; color:#9a8c74; overflow:hidden;
    }
    .ph span{
      font-family:var(--label); text-transform:uppercase; letter-spacing:0.2em;
      font-size:0.85cqw; text-align:center; padding:0.6em;
    }
    .ph span::before{ content:"⬡"; display:block; font-size:1.6cqw; margin-bottom:0.4em; color:#c2b49b; }

    /* Picture 1 : (3,43) , (526,687) */
    .pic1{ left:0.271%; top:6.223%; width:47.160%; height:93.198%; }

    /* ---- Heading "Words from Our Community" : (829,30) , (1060,82) ---- */
    .heading{
      position:absolute; left:74.752%; top:4.342%; width:20.83%;
      font-family:var(--display); font-weight:500;
      font-size:2.62cqw; line-height:1.02; letter-spacing:0.022em; color:var(--ink);
    }

    /* ---- Testimonial card (box) : (539,435) , (934,612) ---- */
    .card{
      position:absolute; left:48.602%; top:62.952%; width:35.618%; height:25.615%;
      background:var(--card);
    }
    /* text inside box : (562,458) , (788,524) — relative to card */
    .card .quote{
      position:absolute; left:5.823%; top:12.994%; width:57.215%;
      font-family:var(--serif); font-weight:500; color:var(--quote);
      font-size:1.74cqw; line-height:1.24;
    }
    /* test down in box (attribution) : (565,585) , (661,599) */
    .card .author{
      position:absolute; left:6.582%; top:84.746%;
      font-family:var(--serif); color:#8c8283;
      font-size:1.36cqw; letter-spacing:0.01em;
    }
    /* arrows inside box : (875,590) , (931,599) */
    .card .arrows{
      position:absolute; left:85.063%; top:83.4%; width:14.18%;
      display:flex; justify-content:space-between; align-items:center;
      font-family:var(--label); font-weight:300; color:var(--ink);
      font-size:1.5cqw;
    }
  </style>
</head>
<body>
  <div class="stage">

    <!-- Picture 1 -->
    <div class="ph pic1"><span>Community</span></div>

    <!-- Heading -->
    <h2 class="heading">Words from Our Community</h2>

    <!-- Testimonial card with nested children -->
    <div class="card">
      <p class="quote">"The most natural-looking extensions I've ever had. Truly an art form."</p>
      <div class="author">Kaia Lindstrom</div>
      <div class="arrows"><span>&larr;</span><span>&rarr;</span></div>
    </div>

  </div>
</body>
</html>
