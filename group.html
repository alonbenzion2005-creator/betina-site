<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA GOLD — The Glow Squad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root{
      --paper:#fdfcfa;
      --ink:#1b1815;
      --ink-soft:#6b6358;
      --gold-deep:#8f6a3f;
      --serif:"Cormorant Garamond",Georgia,serif;
      --display:"Bodoni Moda","Didot",Georgia,serif;
      --label:"Jost","Helvetica Neue",Arial,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#e9e3da;color:var(--ink);font-family:var(--serif);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;}

    /* Proportional canvas: 1109 x 691 */
    .stage{
      position:relative;
      width:100%;
      max-width:1109px;
      aspect-ratio:1109 / 691;
      background:var(--paper);
      container-type:inline-size;
      overflow:hidden;
    }

    /* ---- Photo placeholder ---- */
    .ph{
      position:absolute;
      display:flex; align-items:center; justify-content:center;
      background:repeating-linear-gradient(135deg,#ece5da 0 14px,#e6ddcf 14px 28px);
      border:1px dashed #bcae97; color:#9a8c74; overflow:hidden;
    }
    .ph span{
      font-family:var(--label); text-transform:uppercase; letter-spacing:0.2em;
      font-size:0.85cqw; text-align:center; padding:0.6em;
    }
    .ph span::before{ content:"⬡"; display:block; font-size:1.6cqw; margin-bottom:0.4em; color:#c2b49b; }

    /* ---- Picture 1 (full-bleed hero) : (0,23) , (1109,691) ---- */
    .pic1{ left:0%; top:3.329%; width:100%; height:96.671%; }
  </style>
</head>
<body>
  <div class="stage">

    <!-- Picture 1 -->
    <div class="ph pic1" style="background-image:url('assets/group-squad.jpg');background-size:cover;background-position:center;border:0;"></div>

  </div>
</body>
</html>
